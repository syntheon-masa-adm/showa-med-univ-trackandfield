name: Auto Build & Deploy

on:
  schedule:
    - cron: '0 15 * * *' # 毎日 日本時間0時 (UTC 15時)
  workflow_dispatch: # 手動実行用

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Node.js 24対応の最新バージョンに更新
      - uses: actions/checkout@v4 
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Run Build Script
        run: python build.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html english/index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto build index.html" && git push)
