<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>昭和医科大学陸上部 - 大会スケジュール</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --accent-color: #e63946;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        nav a {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .timeline {
            position: relative;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding-left: 20px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            height: 100%;
            width: 4px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 40px;
            padding-left: 40px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            top: 8px;
            left: -6px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: white;
            border: 4px solid var(--accent-color);
            z-index: 1;
        }

        .timeline-date {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .timeline-content {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary-color);
        }

        .timeline-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .timeline-note {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <nav>
        <a href="../">← ポータルへ戻る</a>
    </nav>

    <header>
        <h1>2026年度 大会スケジュール</h1>
    </header>

    <main class="timeline" id="timeline-container">
        </main>

    <script>
        // 入力されたスケジュールを構造化データとして定義
        const events = [
            { date: "2026/05/02", name: "M×Kディスタンストライアル", note: "土曜日" },
            { date: "2026/05/16", name: "M×Kディスタンストライアル", note: "" },
            { date: "2026/06/06", name: "MDPV陸上大会", note: "土曜日" },
            { date: "2026/07/19", name: "東コメ (東日本コメディカル)", note: "" },
            { date: "2026/08/08", name: "東医体 (東日本医科学生総合体育大会)", note: "" },
            { date: "2026/08/29", name: "全日本MDPV", note: "" },
            { date: "2026/09/20", name: "関東医 (関東医科学生対抗陸上競技大会)", note: "" }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('timeline-container');
            
            // 日付順にソート
            events.sort((a, b) => new Date(a.date) - new Date(b.date));

            events.forEach(event => {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                
                item.innerHTML = `
                    <div class="timeline-date">${formatDisplayDate(event.date)}</div>
                    <div class="timeline-content">
                        <div class="timeline-title">${event.name}</div>
                        ${event.note ? `<div class="timeline-note">${event.note}</div>` : ''}
                    </div>
                `;
                container.appendChild(item);
            });
        });

        function formatDisplayDate(dateStr) {
            const d = new Date(dateStr);
            const week = ["日", "月", "火", "水", "木", "金", "土"];
            return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日 (${week[d.getDay()]})`;
        }
    </script>
</body>
</html>
